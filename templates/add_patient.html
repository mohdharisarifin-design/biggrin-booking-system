`{% extends "base.html" %}

{% block title %}Add Patient - Dental Clinic{% endblock %}

{% block content %}
<h1>Add New Patient</h1>
<p style="color: #718096; margin-bottom: 20px;">Manually add a patient to the system</p>

<div class="card" style="max-width: 600px;">
    <form method="POST" id="addPatientForm">
        <div class="form-group">
            <label for="name">Full Name *</label>
            <input type="text" id="name" name="name" value="{{ form_data.name if form_data else '' }}" required placeholder="Patient's full name">
        </div>
        
        <div class="form-group">
            <label for="phone">Phone Number *</label>
            <input type="tel" id="phone" name="phone" value="{{ form_data.phone if form_data else '' }}" required placeholder="e.g., 012-3456789">
        </div>
        
        <div class="form-group">
            <label for="nric">NRIC / Passport Number</label>
            <input type="text" id="nric" name="nric" value="{{ form_data.nric if form_data else '' }}" placeholder="e.g., 900101-01-1234">
        </div>
        
        <div class="form-group">
            <label for="address">Address</label>
            <textarea id="address" name="address" placeholder="Full residential address">{{ form_data.address if form_data else '' }}</textarea>
        </div>
        
        <div class="form-group" style="display: flex; align-items: center; margin-top: 20px;">
            <label style="display: flex; align-items: center; cursor: pointer;">
                <input type="checkbox" name="is_foreign" {{ 'checked' if form_data and form_data.get('is_foreign') else '' }} style="width: auto; margin-right: 10px;">
                <span>Foreign Patient (Passport)</span>
            </label>
        </div>
        
        <div style="display: flex; gap: 15px; margin-top: 30px;">
            <button type="submit" class="btn btn-success" style="flex: 1;">Add Patient</button>
            <a href="{{ url_for('list_patients') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
