`{% extends "base.html" %}

{% block title %}Add Patient - Dental Clinic{% endblock %}

{% block content %}
<h1>Add New Patient</h1>

<div class="card" style="max-width: 600px;">
    <form method="POST" id="addPatientForm">
        <div class="form-group">
            <label for="name">Full Name *</label>
            <input type="text" id="name" name="name" value="{{ form_data.name if form_data else '' }}" required placeholder="Patient's full name">
        </div>
        
        <div class="form-group">
            <label for="phone">Phone Number *</label>
            <input type="tel" id="phone" name="phone" value="{{ form_data.phone if form_data else '' }}" required placeholder="e.g., 012-3456789">
        </div>
        
        <div class="form-group">
            <label for="email">Email (for appointment reminders)</label>
            <input type="email" id="email" name="email" value="{{ form_data.email if form_data else '' }}" placeholder="e.g., patient@email.com">
            <p style="font-size: 12px; color: #718096; margin-top: 5px;">Optional. Patient will receive email reminders before appointments.</p>
        </div>
        
        <div class="form-group">
            <label for="nric">NRIC / Passport Number</label>
            <input type="text" id="nric" name="nric" value="{{ form_data.nric if form_data else '' }}" placeholder="e.g., 900101-01-1234">
        </div>
        
        <div class="form-group">
            <label for="address">Address</label>
            <textarea id="address" name="address" placeholder="Full residential address">{{ form_data.address if form_data else '' }}</textarea>
        </div>
        
        <div class="form-group" style="display: flex; align-items: center; margin-top: 20px;">
            <label style="display: flex; align-items: center; cursor: pointer;">
                <input type="checkbox" name="is_foreign" {{ 'checked' if form_data and form_data.get('is_foreign') else '' }} style="width: auto; margin-right: 10px;">
                <span>Foreign Patient (Passport)</span>
            </label>
        </div>
        
        <div class="form-group" style="display: flex; align-items: flex-start; margin-top: 20px; padding: 15px; background: #f7fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
            <label style="display: flex; align-items: flex-start; cursor: pointer; margin: 0;">
                <input type="checkbox" name="pdpa_consent" id="pdpa_consent" required style="width: auto; margin-right: 10px; margin-top: 3px;">
                <span style="font-size: 14px; line-height: 1.5;">
                    <strong>PDPA Consent:</strong> I consent to Big Grin Dental Clinic collecting, using, and storing my personal data in accordance with the Personal Data Protection Act (PDPA). I understand that my information will be kept secure and used solely for dental treatment and clinic communication purposes.
                </span>
            </label>
        </div>
        
        <div class="form-group">
            <label>Patient Signature</label>
            <p style="font-size: 14px; color: #718096; margin-bottom: 10px;">Please sign below:</p>
            <canvas id="signaturePad" width="600" height="200" style="border: 2px solid #e2e8f0; border-radius: 8px; background: white; cursor: crosshair; max-width: 100%;"></canvas>
            <input type="hidden" id="signatureData" name="signature_data">
            <div style="margin-top: 10px;">
                <button type="button" onclick="clearSignature()" class="btn btn-sm btn-secondary">Clear Signature</button>
            </div>
        </div>
        
        <div style="display: flex; gap: 15px; margin-top: 30px;">
            <button type="submit" class="btn btn-success" style="flex: 1;">Add Patient</button>
            <a href="{{ url_for('list_patients') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
const canvas = document.getElementById('signaturePad');
const ctx = canvas.getContext('2d');
let isDrawing = false;
let lastX = 0;
let lastY = 0;

// Set up canvas
ctx.strokeStyle = '#000';
ctx.lineWidth = 2;
ctx.lineCap = 'round';

function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX || e.touches[0].clientX) - rect.left;
    const y = (e.clientY || e.touches[0].clientY) - rect.top;
    return { x, y };
}

function startDrawing(e) {
    isDrawing = true;
    const pos = getPos(e);
    lastX = pos.x;
    lastY = pos.y;
}

function draw(e) {
    if (!isDrawing) return;
    e.preventDefault();
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    lastX = pos.x;
    lastY = pos.y;
}

function stopDrawing() {
    isDrawing = false;
    document.getElementById('signatureData').value = canvas.toDataURL();
}

function clearSignature() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    document.getElementById('signatureData').value = '';
}

// Mouse events
canvas.addEventListener('mousedown', startDrawing);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', stopDrawing);
canvas.addEventListener('mouseout', stopDrawing);

// Touch events
canvas.addEventListener('touchstart', startDrawing);
canvas.addEventListener('touchmove', draw);
canvas.addEventListener('touchend', stopDrawing);

// Form validation
document.getElementById('addPatientForm').addEventListener('submit', function(e) {
    if (!document.getElementById('pdpa_consent').checked) {
        e.preventDefault();
        alert('Please agree to the PDPA consent to proceed');
        return false;
    }
    if (!document.getElementById('signatureData').value) {
        e.preventDefault();
        alert('Please provide a signature');
        return false;
    }
});
</script>
{% endblock %}
